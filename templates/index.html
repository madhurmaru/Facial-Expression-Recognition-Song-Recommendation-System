<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion-Based Music Recommender</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      max-width: 1200px;
      width: 95%;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    .video-feed {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.3);
      background: black;
    }

    .table-container {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      overflow-y: auto;
      max-height: 500px;
    }

    table {
      color: white;
    }

    .emotion-box {
      text-align: center;
      font-size: 1.3rem;
      margin-top: 15px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container glass-container">
    <h1 class="display-5">🎵 Mood Music Recommender</h1>

    <div class="row">
      <div class="col-md-6 video-col">
        <h2>🎭 Emotion Detector</h2>

        <video id="video" class="video-feed" autoplay playsinline></video>
        <canvas id="canvas" width="600" height="500" style="display:none;"></canvas>

        <div class="emotion-box">
          Detected Emotion: <span id="emotion">Waiting...</span>
        </div>
      </div>

      <div class="col-md-6 table-col">
        <h2>🎶 Song Recommendations</h2>
        <div id="ResultArea" class="table-container"></div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const emotionText = document.getElementById("emotion");
    const resultArea = document.getElementById("ResultArea");

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(function(stream) {
        video.srcObject = stream;
      })
      .catch(function(error) {
        console.error("Camera error:", error);
        emotionText.innerText = "Camera permission denied";
      });

    async function captureAndPredict() {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }

      const context = canvas.getContext("2d");
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = canvas.toDataURL("image/jpeg");

      try {
        const response = await fetch("/predict_emotion", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ image: imageData })
        });

        const result = await response.json();

        emotionText.innerText = result.emotion;
        createHtmlTable(result.songs);

      } catch (error) {
        console.error("Prediction error:", error);
        emotionText.innerText = "Prediction failed";
      }
    }

    function createHtmlTable(data) {
      resultArea.innerHTML = "";

      const table = document.createElement("table");
      table.className = "table table-striped table-dark table-bordered table-hover";

      const headerRow = document.createElement("tr");

      ["Name", "Album", "Artist"].forEach(function(heading) {
        const th = document.createElement("th");
        th.innerText = heading;
        headerRow.appendChild(th);
      });

      table.appendChild(headerRow);

      data.forEach(function(song) {
        const row = document.createElement("tr");

        ["Name", "Album", "Artist"].forEach(function(key) {
          const td = document.createElement("td");
          td.innerText = song[key] || "";
          row.appendChild(td);
        });

        table.appendChild(row);
      });

      resultArea.appendChild(table);
    }

    setInterval(captureAndPredict, 3000);
  </script>
</body>
</html>
