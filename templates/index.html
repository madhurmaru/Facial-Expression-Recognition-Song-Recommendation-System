<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion-Based Music Recommender</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .glass-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
      max-width: 1200px;
      width: 100%;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 24px;
    }

    .video-feed {
      width: 100%;
      max-width: 600px;
      border-radius: 15px;
      box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.4);
      background: black;
      display: block;
      margin: 0 auto;
    }

    #canvas {
      display: none;
    }

    #processedImage {
      display: none;
    }

    .table-container {
      background: rgba(255, 255, 255, 0.18);
      border-radius: 15px;
      padding: 20px;
      overflow-y: auto;
      max-height: 430px;
      min-height: 80px;
    }

    .emotion-box {
      text-align: center;
      font-size: 1.25rem;
      margin-top: 15px;
      font-weight: 700;
    }

    .small-info {
      text-align: center;
      opacity: 0.9;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .error-box {
      text-align: center;
      color: #ffd2d2;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container glass-container">
    <h1 class="display-5">🎵 Mood Music Recommender</h1>

    <div class="row">
      <div class="col-md-6">
        <h2>🎭 Emotion Detector</h2>

        <!-- Raw browser camera preview -->
        <video id="video" class="video-feed" autoplay playsinline muted></video>

        <!-- Hidden canvas used to send frame to Flask -->
        <canvas id="canvas" width="320" height="240"></canvas>

        <!-- Flask processed image with green box -->
        <img id="processedImage" class="img-fluid video-feed" />

        <div class="emotion-box">
          Detected Emotion: <span id="emotion">Starting camera...</span>
        </div>

        <div class="small-info">
          Faces detected: <span id="faces">0</span> |
          Confidence: <span id="confidence">0%</span>
        </div>

        <div id="errorBox" class="error-box"></div>
      </div>

      <div class="col-md-6">
        <h2>🎶 Song Recommendations</h2>
        <div id="ResultArea" class="table-container">
          Waiting for recommendations...
        </div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const processedImage = document.getElementById("processedImage");

    const emotionText = document.getElementById("emotion");
    const facesText = document.getElementById("faces");
    const confidenceText = document.getElementById("confidence");
    const resultArea = document.getElementById("ResultArea");
    const errorBox = document.getElementById("errorBox");

    let isPredicting = false;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 320 },
            height: { ideal: 240 },
            facingMode: "user"
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();

        emotionText.innerText = "Camera started";
        errorBox.innerText = "";

        console.log("Camera started");
        console.log("Video size:", video.videoWidth, video.videoHeight);

      } catch (error) {
        console.error("Camera error:", error);
        emotionText.innerText = "Camera permission denied";
        errorBox.innerText = "Allow camera permission and refresh the page.";
      }
    }

    async function captureAndPredict() {
      if (isPredicting) return;

      if (!video.videoWidth || !video.videoHeight) {
        console.log("Video not ready yet");
        return;
      }

      isPredicting = true;

      const context = canvas.getContext("2d");
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = canvas.toDataURL("image/jpeg", 0.5);

      try {
        console.log("Sending frame to Flask...");

        const response = await fetch("/predict_emotion", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ image: imageData })
        });

        console.log("Response status:", response.status);

        if (!response.ok) {
          throw new Error("Server returned " + response.status);
        }

        const result = await response.json();

        console.log("Prediction result:", result);

        emotionText.innerText = result.emotion || "Unknown";
        facesText.innerText = result.faces || 0;
        confidenceText.innerText = (result.confidence || 0) + "%";

        if (result.processed_image) {
          processedImage.src = result.processed_image;

          // Hide raw video and show processed frame with green box
          video.style.display = "none";
          processedImage.style.display = "block";
        }

        createHtmlTable(result.songs || []);
        errorBox.innerText = "";

      } catch (error) {
        console.error("Prediction error:", error);
        emotionText.innerText = "Prediction failed";
        errorBox.innerText = "Backend prediction failed. Check Render logs.";
      }

      isPredicting = false;
    }

    function createHtmlTable(data) {
      resultArea.innerHTML = "";

      if (!data || data.length === 0) {
        resultArea.innerHTML = "No songs available.";
        return;
      }

      const table = document.createElement("table");
      table.className = "table table-striped table-dark table-bordered table-hover";

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");

      ["Name", "Album", "Artist"].forEach(function(heading) {
        const th = document.createElement("th");
        th.innerText = heading;
        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      data.forEach(function(song) {
        const row = document.createElement("tr");

        ["Name", "Album", "Artist"].forEach(function(key) {
          const td = document.createElement("td");
          td.innerText = song[key] || "";
          row.appendChild(td);
        });

        tbody.appendChild(row);
      });

      table.appendChild(tbody);
      resultArea.appendChild(table);
    }

    startCamera();

    setTimeout(() => {
      captureAndPredict();
      setInterval(captureAndPredict, 5000);
    }, 2000);
  </script>
</body>
</html>
